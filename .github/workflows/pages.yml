name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: cargo install mdbook --version 0.5.3 --locked

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build book
        run: mdbook build

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch book/.nojekyll
          git fetch origin gh-pages
          git worktree add gh-pages-worktree origin/gh-pages
          find gh-pages-worktree -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R book/. gh-pages-worktree/
          git -C gh-pages-worktree add -A
          git -C gh-pages-worktree commit -m "Deploy mdBook site" || exit 0
          git -C gh-pages-worktree push origin HEAD:gh-pages
